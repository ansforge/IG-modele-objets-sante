name: Workflow Sushi Tests gitHubpages
on:
  workflow_call:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  run-sushi-tests_gitHubPages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: igSource
      # Génère input/images/MOS.xlsx à partir des fichiers FSH (input/fsh/logicals/).
      # Ce fichier est copié tel quel dans l'output par l'IG publisher et rendu
      # téléchargeable depuis la page d'accueil du guide.
      # Le script doit tourner AVANT l'action IG publisher pour que le fichier
      # soit présent lors du build.
      - name: Generate MOS.xlsx
        run: |
          pip install openpyxl --quiet
          python3 igSource/script/generate_mos_xlsx.py
      - uses: ansforge/IG-workflows@main
        with:      
          repo_ig: "./igSource"   
          github_page: "true"
          github_page_token: ${{ secrets.GITHUB_TOKEN }}
          bake: "false"
          validator_cli: "false"
          generate_testscript: "false"
          generate_plantuml : "true"
